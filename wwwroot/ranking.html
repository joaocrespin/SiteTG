<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - NeuroMoblust</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>

<header>
    <nav>
        <span class="logo">⚔ Jogo de Estímulo Cognitivo</span>
        <ul class="nav-links">
            <li><a href="/index.html">Início</a></li>
            <li><a href="#ranking">Ranking</a></li>
        </ul>
    </nav>
</header>

<section id="ranking">
    <div class="inner">
        <span class="s-eye reveal">Melhores jogadores</span>
        <h2 class="s-title reveal">Ranking Global</h2>
        <p class="s-desc reveal">Os aventureiros com mais experiência acumulada.</p>

        
            <div class="ranking-table-wrap">
                <table class="ranking-table" aria-label="Ranking de jogadores">
                    <thead>
                        <tr>
                            <th scope="col">Posição</th>
                            <th scope="col">Jogador</th>
                            <th scope="col">XP</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-list">
                        <tr class="ranking-loading-row">
                            <td colspan="3">
                                <span class="loading-dot"></span>
                                Carregando ranking...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- <div style="text-align: center; margin-top: 1.5rem;">
                <button class="btn-refresh" id="btn-refresh">Atualizar</button> 
            </div> -->
                                
    </div>
</section>

<footer>
    <p>© 2026 · Nenhum direito reservado</p>
</footer>

<script src="/js/ranking.js"></script>
</body>
</html>
