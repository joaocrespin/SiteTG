name: Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publicar aplicação para Windows
      run: dotnet publish SiteTG.csproj -c Release -r win-x86 --self-contained true -o ./publish
      
    - name: Executar Deploy no Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'neuromobius'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
